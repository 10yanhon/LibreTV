<!-- 视频播放器容器 -->
<div id="playerContainer" style="position: relative;">
 <video id="videoPlayer" width="360" height="640" controls playsinline>
   <source src="your-video.mp4" type="video/mp4" />
   您的浏览器不支持 video 标签。
 </video>

 <!-- 原有放大按钮 -->
 <button id="expandBtn" style="position: fixed; bottom: 10px; right: 20px; z-index: 1000;">
   放大
 </button>

 <!-- 新增：铺满全屏按钮，默认隐藏 -->
 <button id="fullfillBtn" title="铺满全屏/退出铺满" style="
   position: fixed;
   bottom: 60px; /* 放大按钮上方 */
   right: 20px;
   background-color: rgba(0, 0, 0, 0.6);
   color: white;
   border: none;
   border-radius: 4px;
   padding: 8px 12px;
   font-size: 14px;
   cursor: pointer;
   display: none; /* 默认隐藏，横屏时显示 */
   z-index: 1001;
   user-select: none;
   transition: background-color 0.3s ease;
 ">
   铺满全屏
 </button>
</div>

<script>
 const videoPlayer = document.getElementById('videoPlayer');
 const expandBtn = document.getElementById('expandBtn');
 const fullfillBtn = document.getElementById('fullfillBtn');

 // 状态变量
 let isLandscapeMode = false;
 let isFullfill = false;

 // 原有：放大按钮切换横屏模式（示例简化版）
 expandBtn.addEventListener('click', () => {
   if (!isLandscapeMode) {
     enterLandscapeMode();
   } else {
     exitLandscapeMode();
   }
 });

 function enterLandscapeMode() {
   isLandscapeMode = true;

   // 这里保持你原本切换横屏逻辑，我用示例数值替代
   videoPlayer.style.width = '100vh';
   videoPlayer.style.height = '100vw';
   videoPlayer.style.objectFit = 'contain';
   videoPlayer.style.position = 'static';

   // 显示铺满按钮 新增
   fullfillBtn.style.display = 'block';

   // 放大按钮文字改为“退出横屏”
   expandBtn.textContent = '退出横屏';
 }

 function exitLandscapeMode() {
   isLandscapeMode = false;

   // 恢复竖屏默认尺寸
   videoPlayer.style.width = '360px';
   videoPlayer.style.height = '640px';
   videoPlayer.style.objectFit = 'contain';
   videoPlayer.style.position = 'static';

   // 隐藏铺满按钮，退出铺满状态（如果有）
   fullfillBtn.style.display = 'none';
   if (isFullfill) {
     exitFullfillMode();
   }

   // 放大按钮文字恢复
   expandBtn.textContent = '放大';
 }

 // 新增：铺满按钮点击事件
 fullfillBtn.addEventListener('click', () => {
   if (!isFullfill) {
     enterFullfillMode();
   } else {
     exitFullfillMode();
   }
 });

 // 新增：进入铺满模式
 function enterFullfillMode() {
   isFullfill = true;

   videoPlayer.style.position = 'fixed';
   videoPlayer.style.top = '0';
   videoPlayer.style.left = '0';
   videoPlayer.style.width = '100vw';
   videoPlayer.style.height = '100vh';
   videoPlayer.style.objectFit = 'cover';
   videoPlayer.style.zIndex = '9999';

   fullfillBtn.textContent = '退出铺满';
 }

 // 新增：退出铺满模式，恢复横屏默认比例
 function exitFullfillMode() {
   isFullfill = false;

   videoPlayer.style.position = 'static';
   videoPlayer.style.width = '100vh';
   videoPlayer.style.height = '100vw';
   videoPlayer.style.objectFit = 'contain';
   videoPlayer.style.zIndex = '';

   fullfillBtn.textContent = '铺满全屏';
 }
</script>
