<!DOCTYPE html>
<html lang="zh">
<head>
    <!-- ✅ [基础配置] 必需字符集声明 -->
    <meta charset="UTF-8">
    
    <!-- ✅ [安全配置] 反盗链策略 -->
    <meta name="referrer" content="same-origin">
    
    <!-- ✅ [移动端优化] 视口控制增强 -->
    <meta name="viewport" 
          content="width=device-width, 
                   initial-scale=1.0, 
                   maximum-scale=1.0, 
                   minimum-scale=1.0, 
                   user-scalable=no,
                   viewport-fit=cover">

    <!-- ✅ [iOS优化] 全屏模式配置 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <title>LibreTV 播放器</title>

    <!-- Favicon -->
    <link rel="icon" href="image/logo.png">
    <link rel="apple-touch-icon" href="image/logo-black.png">
    <link rel="manifest" href="manifest.json">

    <!-- 样式与脚本 -->
    <script src="libs/tailwindcss.min.js"></script>
    <script src="js/wakelock.js"></script>
    <script src="js/version-check.js"></script>
    
    <!-- ✅ [样式优化] 新增iOS适配规则 -->
    <style>
      /* 全面屏安全区域适配 */
      @supports (padding: max(0px)) {
        body {
          padding: env(safe-area-inset-top) env(safe-area-inset-right) 
                   env(safe-area-inset-bottom) env(safe-area-inset-left) !important;
        }
      }
    </style>
    
    <!-- 其他原有样式 -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/player.css">

    <!-- 页面核心样式 -->
    <style>
      /* 原有样式保留不变... */
    </style>
</head>

<body>
    <!-- ================= 头部区域 ================= -->
    <header class="player-header-fixed p-4 flex items-center border-b border-[#333] gap-2">
        <!-- 原有头部内容保持不变... -->
    </header>

    <!-- ================= 主内容区域 ================= -->
    <main class="container mx-auto px-4 py-4">
        <!-- 视频播放容器 -->
        <div id="playerContainer" class="player-container">
            <!-- ✅ [iOS优化] 添加触控事件容器 -->
            <div class="relative" ontouchstart="">
                <!-- 原有播放器结构保持不变... -->
            </div>
        </div>

        <!-- 其他原有模块保持不变... -->
    </main>

    <!-- ================= 页脚区域 ================= -->
    <footer class="footer mt-2 py-6 border-t border-[#333] bg-[#0a0a0a]">
        <!-- 原有页脚内容保持不变... -->
    </footer>

    <!-- ================= 脚本区域 ================= -->
    <!-- 原有基础库保留不变... -->

    <!-- ✅ [iOS优化] 新增全屏控制脚本 -->
    <script>
        // 设备类型检测
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
        
        // 全屏按钮控制逻辑
        function initFullscreenControl() {
            const fsBtn = document.createElement('button');
            fsBtn.id = 'fullscreenBtn';
            fsBtn.innerHTML = '⛶';
            fsBtn.style.cssText = `
                position: fixed;
                bottom: 20px;
                right: 20px;
                z-index: 9999;
                background: rgba(0,0,0,0.7);
                color: white;
                border: none;
                padding: 12px;
                border-radius: 50%;
                display: ${isIOS ? 'none' : 'block'};
            `;

            // 点击事件处理
            fsBtn.onclick = () => {
                if(isIOS) {
                    const video = document.querySelector('video');
                    video?.webkitEnterFullscreen?.();
                } else {
                    !document.fullscreenElement 
                        ? document.documentElement.requestFullscreen()
                        : document.exitFullscreen();
                }
            };

            // 横屏检测
            const updateVisibility = () => {
                if(isIOS) {
                    fsBtn.style.display = Math.abs(window.orientation) === 90 ? 'block' : 'none';
                }
            };

            window.addEventListener('orientationchange', () => {
                setTimeout(updateVisibility, 300);
            });

            document.body.appendChild(fsBtn);
        }

        // 延迟初始化保证元素加载
        setTimeout(initFullscreenControl, 1500);
    </script>
</body>
</html>
